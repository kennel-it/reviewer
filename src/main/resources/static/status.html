<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('reviewer-theme')||'dark');</script>
    <title>Stato analisi — Reviewer</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js" defer></script>
</head>
<body class="status-page">
    <div class="card">
        <div class="card-header">
            <span>&lt;/&gt;</span>
            <h1>Stato analisi</h1>
        </div>

        <p class="job-label">Job ID
            <code id="jobId"></code>
        </p>
        <p class="job-label" style="margin-top:1.4rem;">Stato
            <span id="stateBadge" class="state-badge"></span>
            <code id="packageName" style="margin-left:1rem;"></code>
        </p>

        <ol id="opList"></ol>

        <a href="/">&#8592; Nuova analisi</a>
    </div>

    <script>
        const jobId = new URLSearchParams(window.location.search).get('jobId');
        document.getElementById('jobId').textContent = jobId ?? '(non fornito)';

        const STATE_LABELS = {
            PENDING: 'In attesa…',
            RUNNING: 'In esecuzione…',
            DONE:    'Completato',
            ERROR:   'Errore',
        };

        const stateBadge = document.getElementById('stateBadge');
        const opList     = document.getElementById('opList');

        // Popola `container` con il testo, avvolgendo le parti tra virgolette in <em>
        function renderDesc(container, text) {
            const regex = /"([^"]*)"/g;
            let last = 0, match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last)
                    container.appendChild(document.createTextNode(text.slice(last, match.index)));
                const em = document.createElement('em');
                em.textContent = match[1];
                container.appendChild(em);
                last = regex.lastIndex;
            }
            if (last < text.length)
                container.appendChild(document.createTextNode(text.slice(last)));
        }

        function renderState(data) {
            const state = data.status;
            stateBadge.textContent  = STATE_LABELS[state] ?? state;
            stateBadge.className    = 'state-badge state-' + state.toLowerCase();
            document.getElementById('packageName').textContent = data.packageName ?? '';

            opList.innerHTML = '';
            for (const op of data.operations ?? []) {
                const li   = document.createElement('li');

                const desc = document.createElement('span');
                renderDesc(desc, op.description);

                const badge = document.createElement('span');
                badge.dataset.ok  = op.ok;
                badge.textContent = op.ok ? 'OK' : 'ERRORE';

                li.appendChild(desc);
                li.appendChild(badge);
                opList.appendChild(li);
            }
        }

        async function poll() {
            if (!jobId) return;
            try {
                const res  = await fetch('/status/' + encodeURIComponent(jobId));
                if (!res.ok) return;
                const data = await res.json();
                renderState(data);
                if (data.status !== 'DONE' && data.status !== 'ERROR') {
                    setTimeout(poll, 1000);
                }
            } catch (_) {
                setTimeout(poll, 1000);
            }
        }

        poll();
    </script>
</body>
</html>
