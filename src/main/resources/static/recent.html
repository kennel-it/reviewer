<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('reviewer-theme')||'dark');</script>
    <title>Ultime submissions — Reviewer</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js" defer></script>
</head>
<body class="status-page">
    <div class="card card-wide">
        <div class="card-header">
            <span>&lt;/&gt;</span>
            <h1>Ultime submissions</h1>
        </div>

        <p class="recent-hint">Le ultime 15 analisi inviate, dalla più recente. Aggiornamento automatico ogni 5 s.</p>

        <table id="recentTable">
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th>Stato</th>
                    <th>Inviato</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="recentBody">
                <tr><td colspan="4">Caricamento…</td></tr>
            </tbody>
        </table>

        <a href="/">&#8592; Nuova analisi</a>
    </div>

    <script>
        const STATE_LABELS = {
            PENDING: 'In attesa…',
            RUNNING: 'In esecuzione…',
            DONE:    'Completato',
            ERROR:   'Errore',
        };

        const tbody = document.getElementById('recentBody');

        function formatDate(isoString) {
            const d = new Date(isoString);
            return d.toLocaleString('it-IT', { dateStyle: 'short', timeStyle: 'medium' });
        }

        async function refresh() {
            try {
                const res = await fetch('/status/recent');
                if (!res.ok) {
                    tbody.innerHTML = '<tr><td colspan="4">Errore nel caricamento.</td></tr>';
                    return;
                }
                const jobs = await res.json();

                if (jobs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">Nessuna analisi ancora inviata.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                for (const job of jobs) {
                    const tr = document.createElement('tr');
                    tr.title = 'Clicca per vedere il dettaglio';
                    tr.addEventListener('click', () => {
                        window.location.href = '/status.html?jobId=' + encodeURIComponent(job.jobId);
                    });

                    const tdId = document.createElement('td');
                    tdId.innerHTML = `<code>${job.jobId}</code>`;

                    const tdState = document.createElement('td');
                    const badge = document.createElement('span');
                    badge.className = 'state-badge state-' + job.status.toLowerCase();
                    badge.textContent = STATE_LABELS[job.status] ?? job.status;
                    tdState.appendChild(badge);

                    const tdDate = document.createElement('td');
                    tdDate.textContent = formatDate(job.registeredAt);

                    const tdScore = document.createElement('td');
                    tdScore.textContent = job.score;

                    tr.append(tdId, tdState, tdDate, tdScore);
                    tbody.appendChild(tr);
                }
            } catch (_) {
                tbody.innerHTML = '<tr><td colspan="4">Errore di rete.</td></tr>';
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
